name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CI: true

jobs:
  lint:
    uses: haraka/.github/.github/workflows/lint.yml@master

  ubuntu:
    needs: [lint]
    uses: haraka/.github/.github/workflows/ubuntu.yml@master

  windows:
    needs: [lint]
    uses: haraka/.github/.github/workflows/windows.yml@master
